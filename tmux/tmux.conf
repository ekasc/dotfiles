set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB,ghostty:RGB"

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g history-limit 100000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -g mouse on
setw -g mode-keys vi
setw -g automatic-rename on

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind A switch-client -T agent


bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key ? display-popup -E "tmux list-keys | fzf"

# Prefer macOS clipboard integration when available.
if-shell 'command -v pbcopy >/dev/null 2>&1' "set -s set-clipboard external"

set -g status-style fg=white,bg=default
set -g message-style fg=white,bg=black
set -g status-left-length 30
set -g status-right-length 120
set -g status-left " "
set -g status-justify left

setw -g window-status-style fg="#666666"
setw -g window-status-current-style fg="#66ff00"
setw -g window-status-format " #{pane_current_command} "
setw -g window-status-current-format " #{pane_current_command} "

set -g status-right '#{?pane_in_mode,#[fg=yellow]COPY ,}#[fg=white]#{b:pane_current_path} #[fg=green]#(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null)'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
run '~/.tmux/plugins/tpm/tpm'
